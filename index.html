            localStorage.setItem("orcaMestrePro", JSON.stringify({ estrutura: databaseEstrutura, quantidades: orcamentoQuantidades }));
        }
        function carregarEstadoSalvo() {
            const salvo = localStorage.getItem("orcaMestrePro");
            if (salvo) {
                try {
                    const p = JSON.parse(salvo);
                    if (p.estrutura && p.quantidades) { databaseEstrutura = p.estrutura; orcamentoQuantidades = p.quantidades; return true; }
                } catch(e) {}
            }
            return false;
        }

        function atualizarTotaisUI() {
            let total = 0, count = 0;
            for (let cod in orcamentoQuantidades) {
                if (orcamentoQuantidades[cod].quantidade > 0) {
                    total += orcamentoQuantidades[cod].subtotal;
                    count++;
                }
            }
            document.getElementById("total-geral").innerText = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById("itens-contagem").innerText = `${count} ${count === 1 ? 'item' : 'itens'} quantificado${count !== 1 ? 's' : ''}`;
        }

        function atualizarQuantidadeItem(codigo, valorInput) {
            let qtd = parseFloat(valorInput) || 0;
            let itemEncontrado = null;
            for (let cap of databaseEstrutura) for (let sub of cap.sub) {
                const found = sub.itens.find(i => i.codigo === codigo);
                if (found) { itemEncontrado = found; break; }
            }
            if (!itemEncontrado) return;
            const subtotal = qtd * itemEncontrado.preco;
            if (qtd > 0) orcamentoQuantidades[codigo] = { quantidade: qtd, subtotal, precoUnit: itemEncontrado.preco, unidade: itemEncontrado.unidade, descricao: itemEncontrado.descricao, codigo };
            else delete orcamentoQuantidades[codigo];
            const span = document.getElementById(`subtotal-${codigo}`);
            if (span) span.innerText = `R$ ${subtotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            atualizarTotaisUI();
            salvarEstadoCompleto();
        }

        function removerItemDaEstrutura(capId, subNome, codigoItem) {
            const cap = databaseEstrutura.find(c => c.id === capId);
            if (!cap) return;
            const sub = cap.sub.find(s => s.nome === subNome);
            if (!sub) return;
            const idx = sub.itens.findIndex(i => i.codigo === codigoItem);
            if (idx !== -1) {
                sub.itens.splice(idx, 1);
                delete orcamentoQuantidades[codigoItem];
                renderizarApp();
                salvarEstadoCompleto();
            }
        }

        function adicionarItemNoSubcapitulo(capId, subNome, novoItem) {
            const cap = databaseEstrutura.find(c => c.id === capId);
            if (!cap) return false;
            const sub = cap.sub.find(s => s.nome === subNome);
            if (!sub) return false;
            if (!sub.itens.some(i => i.codigo === novoItem.codigo)) {
                sub.itens.push({ ...novoItem });
                renderizarApp();
                salvarEstadoCompleto();
                return true;
            }
            return false;
        }

        function filtrarItensBiblioteca() {
            const termo = document.getElementById("searchSinapiInput").value.toLowerCase();
            const listaDiv = document.getElementById("listaResultadosBusca");
            listaDiv.innerHTML = "";
            const filtrados = bibliotecaGlobal.filter(item => item.codigo.includes(termo) || item.descricao.toLowerCase().includes(termo));
            if (filtrados.length === 0) { listaDiv.innerHTML = '<div class="text-center text-gray-400 p-8">Nenhum material encontrado</div>'; return; }
            filtrados.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex justify-between items-center hover:shadow-md transition";
                card.innerHTML = `<div><span class="text-[10px] font-mono bg-blue-100 text-blue-800 px-2 py-1 rounded">${item.codigo}</span><p class="font-bold text-sm mt-1">${item.descricao}</p><p class="text-xs text-blue-700 font-black">R$ ${item.preco.toFixed(2)} / ${item.unidade}</p></div><button onclick="confirmarAdicaoItem('${destinoItemAtual.capId}', '${destinoItemAtual.subNome}', '${item.codigo}', '${item.descricao.replace(/'/g, "\\'")}', '${item.unidade}', ${item.preco})" class="bg-blue-700 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-800"><i class="fas fa-cart-plus mr-1"></i> Adicionar</button>`;
                listaDiv.appendChild(card);
            });
        }
        window.confirmarAdicaoItem = function(capId, subNome, codigo, descricao, unidade, preco) {
            const ok = adicionarItemNoSubcapitulo(capId, subNome, { codigo, descricao, unidade, preco });
            fecharModalBusca();
            const toast = document.createElement("div");
            toast.className = "fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-[200]";

            document.body.appendChild(toast);

            if (itens.length === 0) { alert("Nenhum item quantificado."); return; }
            const total = document.getElementById("total-geral").innerText;
            const data = new Date().toLocaleDateString('pt-BR');
            let linhas = "";
            itens.forEach(item => {
                linhas += `<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:10px;">${item.codigo}</td><td style="padding:10px;">${item.descricao}</td><td style="text-align:center;">${item.unidade}</td><td style="text-align:right;">${item.quantidade.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td style="text-align:right;">R$ ${item.precoUnit.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td style="text-align:right;font-weight:bold;">R$ ${item.subtotal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td></tr>`;
            });
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>Orçamento SINAPI/CUB-SC</title><style>body{font-family:'Inter',sans-serif;padding:40px;} .header{border-bottom:3px solid #1e3a8a;} table{width:100%;border-collapse:collapse;} th{background:#f1f5f9;padding:10px;text-align:left;}</style></head><body><div class="header"><h1 style="color:#1e3a8a;">ORÇAMENTO DE OBRA</h1><p>SINAPI/SC + CUB-SC - Florianópolis (Março/2026) | Emissão: ${data}</p></div><table><thead><tr><th>Código</th><th>Descrição</th><th>Un.</th><th>Qtd.</th><th>Unitário</th><th>Subtotal</th></tr></thead><tbody>${linhas}</tbody></table><div style="margin-top:30px; text-align:right;"><strong>VALOR TOTAL: ${total}</strong></div><p style="margin-top:40px; font-size:9px; color:#aaa;">Documento orçamentário baseado em composições SINAPI/CEF 03/2026 e CUB-SC. Não substitui projeto executivo.</p></body></html>`);
            win.document.close();
            win.print();
            document.getElementById("modalSuccess").classList.remove("hidden");
        }
        function fecharModalSucesso() { document.getElementById("modalSuccess").classList.add("hidden"); }
        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 130, behavior: 'smooth' });
        }

        function renderizarApp() {
            const root = document.getElementById("app-root");
            if (!root) return;
            root.innerHTML = "";
            for (let cap of databaseEstrutura) {
                const section = document.createElement("section");
                section.id = cap.id;
                section.className = `bg-white rounded-3xl shadow-xl border-t-8 ${cap.cor} overflow-hidden transition-all mb-12`;
                let subHtml = "";
                for (let sub of cap.sub) {
                    let itensHtml = "";
                    for (let item of sub.itens) {
                        const qtd = orcamentoQuantidades[item.codigo]?.quantidade || "";
                        const subtotal = orcamentoQuantidades[item.codigo]?.subtotal || 0;
                        itensHtml += `<div class="group flex flex-wrap md:flex-nowrap items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl hover:border-blue-300 transition-all shadow-sm"><div class="flex-1 min-w-[180px] mb-3 md:mb-0"><div class="flex items-center gap-2 mb-1"><span class="text-[10px] font-black bg-slate-800 text-white px-2 py-0.5 rounded-md">${item.codigo}</span><span class="text-[9px] text-gray-400 font-bold uppercase">${item.unidade}</span></div><p class="text-sm font-semibold text-gray-800">${item.descricao}</p><p class="text-[11px] text-blue-700 font-bold mt-1">R$ ${item.preco.toFixed(2)} / ${item.unidade}</p></div><div class="flex items-center gap-3 bg-gray-50 p-2 rounded-xl"><div class="relative"><input type="number" value="${qtd}" step="0.01" min="0" placeholder="0,00" onchange="atualizarQuantidadeItem('${item.codigo}', this.value)" class="w-28 bg-white border-2 border-gray-200 rounded-xl px-3 py-2 text-right font-bold text-blue-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none"><span class="absolute left-2 top-[-8px] bg-white px-1 text-[8px] text-gray-400 font-bold">QTD.</span></div><div class="min-w-[100px] text-right"><p class="text-[8px] text-gray-400 font-black uppercase">SUBTOTAL</p><p id="subtotal-${item.codigo}" class="text-sm font-black text-gray-800">R$ ${subtotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p></div><button onclick="removerItemDaEstrutura('${cap.id}', '${sub.nome}', '${item.codigo}')" class="text-gray-300 hover:text-red-500 transition-all p-2"><i class="fas fa-trash-alt text-sm"></i></button></div></div>`;
                    }
                    subHtml += `<div class="px-6 py-6 border-b last:border-b-0"><h3 class="text-xs font-black text-blue-900 mb-5 uppercase tracking-wider flex items-center gap-2"><span class="w-3 h-3 bg-blue-800 rounded-full"></span> ${sub.nome}</h3><div class="space-y-4">${itensHtml}</div><button onclick="abrirModalBusca('${cap.id}', '${sub.nome}')" class="mt-5 w-full py-3 border-2 border-dashed border-blue-200 rounded-xl text-blue-600 font-bold text-xs hover:bg-blue-50 flex items-center justify-center gap-2 transition"><i class="fas fa-plus-circle"></i> ADICIONAR ITEM DA TABELA SINAPI</button></div>`;
                }
                section.innerHTML = `<div class="bg-gray-50 px-6 py-4 border-b flex justify-between items-center"><h2 class="text-sm font-black text-gray-800 uppercase tracking-tight">${cap.titulo}</h2>${cap.id === 'cap-cub' ? '<span class="text-[9px] bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold">CUB-SC MARÇO/2026</span>' : ''}</div>${subHtml}`;
                root.appendChild(section);
            }
            atualizarTotaisUI();
        }

        // Expor funções globais
        window.atualizarQuantidadeItem = atualizarQuantidadeItem;
        window.removerItemDaEstrutura = removerItemDaEstrutura;
        window.abrirModalBusca = abrirModalBusca;
        window.fecharModalBusca = fecharModalBusca;
        window.resetarOrcamentoCompleto = resetarOrcamentoCompleto;
        window.exportarRelatorioPDF = exportarRelatorioPDF;
        window.fecharModalSucesso = fecharModalSucesso;
        window.scrollToSection = scrollToSection;

        // Inicialização
        if (!carregarEstadoSalvo()) {
            databaseEstrutura = JSON.parse(JSON.stringify(estruturaBaseCap));
            orcamentoQuantidades = {};
        }
        renderizarApp();
        document.getElementById("searchSinapiInput")?.addEventListener("input", filtrarItensBiblioteca);
    </script>
</body>
</html>
